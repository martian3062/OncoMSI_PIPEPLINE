<section
  id="milestone-ticker"
  class="milestone-ticker glass"
  hx-get="{% url 'milestone-ticker-partial' %}"
  hx-trigger="load delay:1s, every 12s"
  hx-swap="outerHTML"
  data-items="{{ milestone_items_json|escapejs }}"
  x-data="{
    items: [],
    activeIndex: 0,
    booted: false,
    init() {
      if (this.booted) {
        return;
      }
      this.items = JSON.parse(this.$el.dataset.items || '[]');
      this.booted = true;
      setInterval(() => {
        if (!this.items.length) {
          return;
        }
        this.activeIndex = (this.activeIndex + 1) % this.items.length;
      }, 2500);
    }
  }"
>
  <div class="ticker-kicker">Live Milestones</div>
  <div class="ticker-track">
    <template x-for="(item, index) in items" :key="index">
      <div
        class="ticker-item"
        :class="{
          'ticker-item-warning': item.variant === 'warning',
          'ticker-item-idle': item.variant === 'idle'
        }"
        x-show="activeIndex === index"
        x-transition:enter="ticker-enter"
        x-transition:enter-start="ticker-enter-start"
        x-transition:enter-end="ticker-enter-end"
        x-transition:leave="ticker-leave"
        x-transition:leave-start="ticker-leave-start"
        x-transition:leave-end="ticker-leave-end"
      >
        <span class="ticker-live-dot"></span>
        <div class="ticker-copy">
          <div class="ticker-topline">
            <span class="ticker-stage" x-text="item.stage"></span>
            <span class="ticker-run-id" x-text="item.run_id"></span>
          </div>
          <strong x-text="item.title"></strong>
          <span class="ticker-detail" x-text="item.detail"></span>
          <span class="ticker-meta" x-text="item.meta"></span>
        </div>
      </div>
    </template>
  </div>
</section>
